apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "studio.fullname" . }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "studio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "studio.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: studio
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: AICORE_RESOURCE_GROUP
              value: {{ .Values.config.aiCoreResourceGroup | quote }}
            - name: ENABLE_HYPERSPACE_PROVIDERS
              value: {{ .Values.config.enableHyperspaceProviders | quote }}
            - name: ENABLE_SAP_AI_CORE
              value: {{ .Values.config.enableSapAiCore | quote }}
            - name: BTP_TRIM_MODE
              value: {{ .Values.config.btpTrimMode | quote }}
            # The full AI Core service key JSON, sourced from the Secret created
            # by the BTP Service Operator (or a pre-existing one).
            - name: AICORE_SERVICE_KEY_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ include "studio.bindingSecretName" . }}
                  key: {{ .Values.serviceOperator.secretKey }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: 3000
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: 3000
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
